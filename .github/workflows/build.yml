name: Build

on:
  push:
    branches:
      - main
  pull_request:
  # This line adds a manual "Run workflow" button in the GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: linux
            goarch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # Adding caching to speed up builds and save free minutes
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build cmd/main.go
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: go build -v -o bin/main-${{ matrix.target.goos }}-${{ matrix.target.goarch }} ./cmd/main.go